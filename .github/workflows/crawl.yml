name: Daily AI Stack Crawl

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 01:00 EST = 11:00 IST — off-peak, avoids rate limits
  workflow_dispatch:       # manual trigger from GitHub UI for testing

permissions:
  contents: write          # needed to commit ai-companies.json back to repo

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # hard cap — free tier protection

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        run: python crawler/crawl.py

      - name: Verify output
        run: |
          python - <<'EOF'
          import json, sys
          with open("react-app/public/data/ai-companies.json") as f:
              data = json.load(f)
          count = data["meta"]["company_count"]
          if count < 5:
              print(f"ERROR: Only {count} companies in output — crawler likely failed")
              sys.exit(1)
          print(f"OK: {count} companies, {data['meta']['total_detections']} total detections")
          EOF

      - name: Commit updated data
        run: |
          git config user.name  "Altor Crawler Bot"
          git config user.email "bot@altorlab.com"
          git add react-app/public/data/ai-companies.json
          if git diff --staged --quiet; then
            echo "No changes detected — skipping commit"
          else
            git commit -m "chore(data): daily AI stack crawl $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Trigger site rebuild
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'master'
            })
