name: Daily MCP Server Directory Crawl

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily — offset from ai-stack crawl (06:00) to avoid parallel runs
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - run: pip install -r crawler/requirements.txt

      - name: Fetch MCP servers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python crawler/fetch_mcp_servers.py

      - name: Verify output
        run: |
          python - <<'EOF'
          import json, sys
          with open("react-app/public/data/mcp-servers.json") as f:
              d = json.load(f)
          n = d["meta"]["total_servers"]
          if n < 20:
              print(f"ERROR: only {n} servers — crawler likely failed"); sys.exit(1)
          print(f"OK: {n} MCP servers across {len(d['meta']['categories'])} categories")
          EOF

      - name: Commit and push
        run: |
          git config user.name "Altor Crawler Bot"
          git config user.email "bot@altorlab.com"
          git add react-app/public/data/mcp-servers.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git pull --rebase origin master
            git commit -m "chore(data): daily MCP server directory update $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Trigger site rebuild
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'master'
            })
