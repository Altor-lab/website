name: Daily Automation Workflows Update

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily — offset from MCP (04:00) and AI stack (06:00) crawls
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - run: pip install -r crawler/requirements.txt

      - name: Build automation pages dataset
        run: python crawler/fetch_automations.py

      - name: Verify output
        run: |
          python - <<'EOF'
          import json, sys
          with open("react-app/public/data/automations.json") as f:
              d = json.load(f)
          n = d["meta"]["total_pages"]
          if n < 10:
              print(f"ERROR: only {n} pages — script likely failed"); sys.exit(1)
          print(f"OK: {n} automation pages, {d['meta']['workflows']} workflows × {d['meta']['tools']} tools")
          EOF

      - name: Commit and push
        run: |
          git config user.name "Altor Crawler Bot"
          git config user.email "bot@altorlab.com"
          cp react-app/public/data/automations.json /tmp/automations.json
          git fetch origin master
          git reset --hard origin/master
          cp /tmp/automations.json react-app/public/data/automations.json
          git add react-app/public/data/automations.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore(data): daily automation workflows update $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Trigger site rebuild
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'master'
            })
