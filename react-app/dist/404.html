<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Altor</title>
  <script>
    // GitHub Pages SPA redirect.
    // Converts path to query param so index.html can pick it up via React Router.
    // Pre-rendered routes have their own index.html and won't hit this.
    var path = window.location.pathname;
    var query = window.location.search;
    window.location.replace(
      window.location.origin + '/?p=' + encodeURIComponent(path) + (query ? '&q=' + encodeURIComponent(query) : '')
    );
  </script>
</head>
<body>
</body>
</html>
